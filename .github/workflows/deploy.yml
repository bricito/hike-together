name: Deploy to Cloudflare Workers + Supabase

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # 3. Install dependencies
      - name: Install dependencies
        run: bun install

      # 4. Build project
      - name: Build project
        run: bun run build

      # 5. Deploy Cloudflare Workers
      - name: Deploy to Cloudflare Workers
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 6. Install Supabase CLI
      - name: Install Supabase CLI
        run: npm install -g supabase

      # 7. Deploy Supabase Edge Functions
      - name: Deploy Supabase functions
        run: |
          supabase functions deploy send-checkin-reminder --project-ref zyxeupstiihvrzelbgwi
          supabase functions deploy send-fcm-notification --project-ref zyxeupstiihvrzelbgwi
          supabase functions deploy notify-nearby-users --project-ref zyxeupstiihvrzelbgwi
          supabase functions deploy geocode-profiles --project-ref zyxeupstiihvrzelbgwi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
